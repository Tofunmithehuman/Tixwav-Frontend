<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Performance: connect to font/image CDNs early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Start the home events fetch before the app bundle loads so the hero
         (LCP) image URL is known ~1.5s sooner. Consumed by the event store;
         home page + production only, and falls back to the normal request if
         anything fails. -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          if (location.pathname !== "/") return;
          if (h === "localhost" || h === "127.0.0.1") return;
          var go = function (qs) {
            return fetch("/api/events?" + qs, { credentials: "include" })
              .then(function (r) {
                return r.ok ? r.json() : null;
              })
              .catch(function () {
                return null;
              });
          };
          window.__TW_PRELOAD__ = {
            latest: go("active=true&sort=-createdAt&limit=8"),
            popular: go("active=true&sort=-totalRevenue&limit=6"),
          };
        } catch (e) {}
      })();
    </script>

    <!-- Brand font (header logo) -->
    <link
      rel="preload"
      as="font"
      type="font/otf"
      crossorigin
      href="/fonts/QurovaDEMO-Medium-BF67a5c6382651c.otf"
    />

    <!-- Load Google Fonts without blocking render (font-display:swap shows
         fallback text immediately, then swaps in Poppins). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      />
    </noscript>

    <!-- Primary SEO -->
    <title>Tixwav — Discover &amp; Book Tickets for Events in Nigeria</title>
    <meta
      name="description"
      content="Tixwav is Nigeria's event ticketing platform. Discover concerts, conferences, festivals, workshops and more — buy tickets in seconds, or sell your own event with payouts straight to your bank."
    />
    <meta
      name="keywords"
      content="Tixwav, event tickets, buy tickets Nigeria, sell tickets, concerts Lagos, conferences, festivals, event organizer, online tickets"
    />
    <meta name="author" content="Tixwav" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ff7f11" />
    <link rel="canonical" href="https://tixwav.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tixwav" />
    <meta
      property="og:title"
      content="Tixwav — Discover &amp; Book Tickets for Events in Nigeria"
    />
    <meta
      property="og:description"
      content="Discover concerts, conferences, festivals and more — buy tickets in seconds, or sell your own event with payouts straight to your bank."
    />
    <meta property="og:url" content="https://tixwav.vercel.app/" />
    <meta property="og:image" content="https://tixwav.vercel.app/Card.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tixwav — Tickets for the best events" />
    <meta
      name="twitter:description"
      content="Discover and book tickets for concerts, conferences and festivals across Nigeria."
    />
    <meta name="twitter:image" content="https://tixwav.vercel.app/Card.png" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Tixwav",
        "url": "https://tixwav.vercel.app",
        "logo": "https://tixwav.vercel.app/Logo.png",
        "description": "Nigeria's event ticketing platform — discover, buy and sell event tickets.",
        "email": "tixwav@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Lagos",
          "addressCountry": "NG"
        }
      }
    </script>
    <script>
      // Apply the saved theme before React paints to avoid a flash of light mode.
      try {
        if (localStorage.getItem("theme") === "dark")
          document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
