<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tixwav — Discover &amp; Book Tickets for Events in Nigeria</title>
    <meta
      name="description"
      content="Tixwav is Nigeria's event ticketing platform. Discover concerts, conferences, festivals, workshops and more — buy tickets in seconds, or sell your own event with payouts straight to your bank."
    />
    <meta
      name="keywords"
      content="Tixwav, event tickets, buy tickets Nigeria, sell tickets, concerts Lagos, conferences, festivals, event organizer, online tickets"
    />
    <meta name="author" content="Tixwav" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ff7f11" />
    <link rel="canonical" href="https://tixwav.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tixwav" />
    <meta
      property="og:title"
      content="Tixwav — Discover &amp; Book Tickets for Events in Nigeria"
    />
    <meta
      property="og:description"
      content="Discover concerts, conferences, festivals and more — buy tickets in seconds, or sell your own event with payouts straight to your bank."
    />
    <meta property="og:url" content="https://tixwav.vercel.app/" />
    <meta property="og:image" content="https://tixwav.vercel.app/Logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tixwav — Tickets for the best events" />
    <meta
      name="twitter:description"
      content="Discover and book tickets for concerts, conferences and festivals across Nigeria."
    />
    <meta name="twitter:image" content="https://tixwav.vercel.app/Logo.png" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Tixwav",
        "url": "https://tixwav.vercel.app",
        "logo": "https://tixwav.vercel.app/Logo.png",
        "description": "Nigeria's event ticketing platform — discover, buy and sell event tickets.",
        "email": "tixwav@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Lagos",
          "addressCountry": "NG"
        }
      }
    </script>
    <script>
      // Apply the saved theme before React paints to avoid a flash of light mode.
      try {
        if (localStorage.getItem("theme") === "dark")
          document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
